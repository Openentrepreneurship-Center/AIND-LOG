<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>과학 계산기</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .calculator {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 480px;
      }

      .mode-toggle {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .mode-toggle button {
        flex: 1;
        padding: 8px;
        font-size: 13px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.5);
        transition: all 0.2s ease;
      }

      .mode-toggle button.active {
        background: rgba(99, 102, 241, 0.4);
        color: #a5b4fc;
      }

      .mode-toggle button:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .display {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 14px;
        padding: 20px 24px;
        margin-bottom: 20px;
        text-align: right;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .display .expression {
        color: rgba(255, 255, 255, 0.5);
        font-size: 15px;
        min-height: 22px;
        word-break: break-all;
        line-height: 1.4;
      }

      .display .result {
        color: #fff;
        font-size: 38px;
        font-weight: 300;
        margin-top: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
      }

      .buttons.basic-mode {
        grid-template-columns: repeat(4, 1fr);
      }

      button {
        padding: 16px 8px;
        font-size: 17px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-weight: 500;
      }

      button:active {
        transform: scale(0.95);
      }

      .btn-number {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }

      .btn-number:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .btn-operator {
        background: rgba(99, 102, 241, 0.4);
        color: #a5b4fc;
      }

      .btn-operator:hover {
        background: rgba(99, 102, 241, 0.6);
      }

      .btn-function {
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.7);
      }

      .btn-function:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .btn-scientific {
        background: rgba(16, 185, 129, 0.2);
        color: #6ee7b7;
        font-size: 14px;
      }

      .btn-scientific:hover {
        background: rgba(16, 185, 129, 0.35);
      }

      .btn-equals {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
      }

      .btn-equals:hover {
        background: linear-gradient(135deg, #7c7ff7, #9d78f8);
      }

      .btn-clear {
        background: rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      }

      .btn-clear:hover {
        background: rgba(239, 68, 68, 0.5);
      }

      .btn-zero {
        grid-column: span 2;
      }

      .btn-constant {
        background: rgba(251, 191, 36, 0.2);
        color: #fcd34d;
        font-size: 15px;
      }

      .btn-constant:hover {
        background: rgba(251, 191, 36, 0.35);
      }

      .scientific-row {
        display: none;
      }

      .scientific-row.show {
        display: contents;
      }

      /* Angle mode indicator */
      .angle-indicator {
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .display {
        position: relative;
      }

      sup {
        font-size: 0.65em;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="mode-toggle">
        <button id="btnBasic" class="active" onclick="setMode('basic')">
          기본
        </button>
        <button id="btnScientific" onclick="setMode('scientific')">과학</button>
      </div>

      <div class="display">
        <span class="angle-indicator" id="angleIndicator"></span>
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="buttons" id="buttonsGrid">
        <!-- Scientific Row 1 -->
        <span class="scientific-row" id="sci1">
          <button class="btn-scientific" onclick="applyUnary('sin')">
            sin
          </button>
        </span>
        <span class="scientific-row" id="sci2">
          <button class="btn-scientific" onclick="applyUnary('cos')">
            cos
          </button>
        </span>
        <span class="scientific-row" id="sci3">
          <button class="btn-scientific" onclick="applyUnary('tan')">
            tan
          </button>
        </span>
        <span class="scientific-row" id="sci4">
          <button class="btn-scientific" onclick="applyUnary('asin')">
            sin⁻¹
          </button>
        </span>
        <span class="scientific-row" id="sci5">
          <button class="btn-scientific" onclick="applyUnary('acos')">
            cos⁻¹
          </button>
        </span>

        <!-- Scientific Row 2 -->
        <span class="scientific-row" id="sci6">
          <button class="btn-scientific" onclick="applyUnary('atan')">
            tan⁻¹
          </button>
        </span>
        <span class="scientific-row" id="sci7">
          <button class="btn-scientific" onclick="applyUnary('log')">
            log
          </button>
        </span>
        <span class="scientific-row" id="sci8">
          <button class="btn-scientific" onclick="applyUnary('ln')">ln</button>
        </span>
        <span class="scientific-row" id="sci9">
          <button class="btn-scientific" onclick="applyUnary('sqrt')">
            √x
          </button>
        </span>
        <span class="scientific-row" id="sci10">
          <button class="btn-scientific" onclick="applyUnary('cbrt')">
            ³√x
          </button>
        </span>

        <!-- Scientific Row 3 -->
        <span class="scientific-row" id="sci11">
          <button class="btn-scientific" onclick="applyUnary('square')">
            x²
          </button>
        </span>
        <span class="scientific-row" id="sci12">
          <button class="btn-scientific" onclick="applyUnary('cube')">
            x³
          </button>
        </span>
        <span class="scientific-row" id="sci13">
          <button class="btn-scientific" onclick="setOperator('xⁿ')">xⁿ</button>
        </span>
        <span class="scientific-row" id="sci14">
          <button class="btn-scientific" onclick="applyUnary('exp')">eˣ</button>
        </span>
        <span class="scientific-row" id="sci15">
          <button class="btn-scientific" onclick="applyUnary('10x')">
            10ˣ
          </button>
        </span>

        <!-- Scientific Row 4 -->
        <span class="scientific-row" id="sci16">
          <button class="btn-scientific" onclick="applyUnary('factorial')">
            n!
          </button>
        </span>
        <span class="scientific-row" id="sci17">
          <button class="btn-scientific" onclick="applyUnary('inverse')">
            1/x
          </button>
        </span>
        <span class="scientific-row" id="sci18">
          <button class="btn-scientific" onclick="applyUnary('abs')">
            |x|
          </button>
        </span>
        <span class="scientific-row" id="sci19">
          <button class="btn-constant" onclick="insertConstant('pi')">π</button>
        </span>
        <span class="scientific-row" id="sci20">
          <button class="btn-constant" onclick="insertConstant('e')">e</button>
        </span>

        <!-- Basic Buttons -->
        <button class="btn-clear" onclick="clearAll()">AC</button>
        <button class="btn-function" onclick="toggleSign()">+/−</button>
        <button class="btn-function" onclick="percent()">%</button>
        <span class="scientific-row" id="sciMod">
          <button class="btn-function" onclick="setOperator('mod')">mod</button>
        </span>
        <button class="btn-operator" onclick="setOperator('÷')">÷</button>

        <button class="btn-number" onclick="appendNumber('7')">7</button>
        <button class="btn-number" onclick="appendNumber('8')">8</button>
        <button class="btn-number" onclick="appendNumber('9')">9</button>
        <span class="scientific-row" id="sciParen1">
          <button class="btn-function" onclick="insertParenthesis('(')">
            (
          </button>
        </span>
        <button class="btn-operator" onclick="setOperator('×')">×</button>

        <button class="btn-number" onclick="appendNumber('4')">4</button>
        <button class="btn-number" onclick="appendNumber('5')">5</button>
        <button class="btn-number" onclick="appendNumber('6')">6</button>
        <span class="scientific-row" id="sciParen2">
          <button class="btn-function" onclick="insertParenthesis(')')">
            )
          </button>
        </span>
        <button class="btn-operator" onclick="setOperator('−')">−</button>

        <button class="btn-number" onclick="appendNumber('1')">1</button>
        <button class="btn-number" onclick="appendNumber('2')">2</button>
        <button class="btn-number" onclick="appendNumber('3')">3</button>
        <span class="scientific-row" id="sciDeg">
          <button
            class="btn-scientific"
            onclick="toggleAngleMode()"
            id="btnAngleMode"
          >
            DEG
          </button>
        </span>
        <button class="btn-operator" onclick="setOperator('+')">+</button>

        <button class="btn-number btn-zero" onclick="appendNumber('0')">
          0
        </button>
        <button class="btn-number" onclick="appendDot()">.</button>
        <span class="scientific-row" id="sciRand">
          <button class="btn-scientific" onclick="insertRandom()">Rand</button>
        </span>
        <button class="btn-equals" onclick="calculate()">=</button>
      </div>
    </div>

    <script>
      let currentInput = "0";
      let previousInput = "";
      let operator = null;
      let shouldResetInput = false;
      let mode = "basic"; // 'basic' or 'scientific'
      let angleMode = "deg"; // 'deg' or 'rad'

      const expressionEl = document.getElementById("expression");
      const resultEl = document.getElementById("result");
      const buttonsGrid = document.getElementById("buttonsGrid");

      function updateDisplay() {
        resultEl.textContent = currentInput;
        const len = currentInput.length;
        if (len > 16) {
          resultEl.style.fontSize = "20px";
        } else if (len > 12) {
          resultEl.style.fontSize = "26px";
        } else if (len > 8) {
          resultEl.style.fontSize = "32px";
        } else {
          resultEl.style.fontSize = "38px";
        }
      }

      function setMode(m) {
        mode = m;
        document
          .getElementById("btnBasic")
          .classList.toggle("active", m === "basic");
        document
          .getElementById("btnScientific")
          .classList.toggle("active", m === "scientific");

        const sciElements = document.querySelectorAll(".scientific-row");
        sciElements.forEach((el) => {
          el.classList.toggle("show", m === "scientific");
        });

        buttonsGrid.classList.toggle("basic-mode", m === "basic");

        document.getElementById("angleIndicator").textContent =
          m === "scientific" ? angleMode.toUpperCase() : "";
      }

      function toggleAngleMode() {
        angleMode = angleMode === "deg" ? "rad" : "deg";
        document.getElementById("btnAngleMode").textContent =
          angleMode.toUpperCase();
        document.getElementById("angleIndicator").textContent =
          angleMode.toUpperCase();
      }

      function toRadians(value) {
        return angleMode === "deg" ? (value * Math.PI) / 180 : value;
      }

      function fromRadians(value) {
        return angleMode === "deg" ? (value * 180) / Math.PI : value;
      }

      function appendNumber(num) {
        if (shouldResetInput) {
          currentInput = "0";
          shouldResetInput = false;
        }
        if (currentInput === "0" && num !== ".") {
          currentInput = num;
        } else if (currentInput.length < 15) {
          currentInput += num;
        }
        updateDisplay();
      }

      function appendDot() {
        if (shouldResetInput) {
          currentInput = "0";
          shouldResetInput = false;
        }
        if (!currentInput.includes(".")) {
          currentInput += ".";
        }
        updateDisplay();
      }

      function setOperator(op) {
        if (operator && !shouldResetInput) {
          calculate();
        }
        previousInput = currentInput;
        operator = op;
        shouldResetInput = true;

        const displayOp = op === "xⁿ" ? "^" : op === "mod" ? "mod" : op;
        expressionEl.textContent = `${previousInput} ${displayOp}`;
      }

      function calculate() {
        if (!operator || (shouldResetInput && !previousInput)) return;

        const prev = parseFloat(previousInput);
        const curr = parseFloat(currentInput);
        let result;

        switch (operator) {
          case "+":
            result = prev + curr;
            break;
          case "−":
            result = prev - curr;
            break;
          case "×":
            result = prev * curr;
            break;
          case "÷":
            if (curr === 0) {
              currentInput = "오류";
              operator = null;
              previousInput = "";
              expressionEl.textContent = "";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = prev / curr;
            break;
          case "xⁿ":
            result = Math.pow(prev, curr);
            break;
          case "mod":
            if (curr === 0) {
              currentInput = "오류";
              operator = null;
              previousInput = "";
              expressionEl.textContent = "";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = prev % curr;
            break;
          default:
            return;
        }

        if (!isFinite(result)) {
          currentInput = "오류";
          operator = null;
          previousInput = "";
          expressionEl.textContent = "";
          updateDisplay();
          shouldResetInput = true;
          return;
        }

        // 부동소수점 오차 보정
        result = parseFloat(result.toPrecision(12));

        const displayOp = operator === "xⁿ" ? "^" : operator;
        expressionEl.textContent = `${previousInput} ${displayOp} ${currentInput} =`;
        currentInput = String(result);
        operator = null;
        previousInput = "";
        shouldResetInput = true;
        updateDisplay();
      }

      function applyUnary(fn) {
        const val = parseFloat(currentInput);
        if (isNaN(val) && currentInput !== "오류") return;

        let result;
        let label = "";

        switch (fn) {
          case "sin":
            result = Math.sin(toRadians(val));
            label = `sin(${currentInput})`;
            break;
          case "cos":
            result = Math.cos(toRadians(val));
            label = `cos(${currentInput})`;
            break;
          case "tan":
            result = Math.tan(toRadians(val));
            label = `tan(${currentInput})`;
            break;
          case "asin":
            if (val < -1 || val > 1) {
              currentInput = "오류";
              expressionEl.textContent = "sin⁻¹ 정의역 초과";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = fromRadians(Math.asin(val));
            label = `sin⁻¹(${currentInput})`;
            break;
          case "acos":
            if (val < -1 || val > 1) {
              currentInput = "오류";
              expressionEl.textContent = "cos⁻¹ 정의역 초과";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = fromRadians(Math.acos(val));
            label = `cos⁻¹(${currentInput})`;
            break;
          case "atan":
            result = fromRadians(Math.atan(val));
            label = `tan⁻¹(${currentInput})`;
            break;
          case "log":
            if (val <= 0) {
              currentInput = "오류";
              expressionEl.textContent = "log 정의역 초과";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = Math.log10(val);
            label = `log(${currentInput})`;
            break;
          case "ln":
            if (val <= 0) {
              currentInput = "오류";
              expressionEl.textContent = "ln 정의역 초과";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = Math.log(val);
            label = `ln(${currentInput})`;
            break;
          case "sqrt":
            if (val < 0) {
              currentInput = "오류";
              expressionEl.textContent = "√ 음수 불가";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = Math.sqrt(val);
            label = `√(${currentInput})`;
            break;
          case "cbrt":
            result = Math.cbrt(val);
            label = `³√(${currentInput})`;
            break;
          case "square":
            result = val * val;
            label = `(${currentInput})²`;
            break;
          case "cube":
            result = val * val * val;
            label = `(${currentInput})³`;
            break;
          case "exp":
            result = Math.exp(val);
            label = `e^(${currentInput})`;
            break;
          case "10x":
            result = Math.pow(10, val);
            label = `10^(${currentInput})`;
            break;
          case "factorial":
            if (val < 0 || !Number.isInteger(val)) {
              currentInput = "오류";
              expressionEl.textContent = "n!은 0 이상 정수만";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            if (val > 170) {
              currentInput = "Infinity";
              expressionEl.textContent = `${currentInput}!`;
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = factorial(val);
            label = `${currentInput}!`;
            break;
          case "inverse":
            if (val === 0) {
              currentInput = "오류";
              expressionEl.textContent = "1/0 불가";
              updateDisplay();
              shouldResetInput = true;
              return;
            }
            result = 1 / val;
            label = `1/(${currentInput})`;
            break;
          case "abs":
            result = Math.abs(val);
            label = `|${currentInput}|`;
            break;
          default:
            return;
        }

        if (!isFinite(result)) {
          currentInput = "오류";
          expressionEl.textContent = label;
          updateDisplay();
          shouldResetInput = true;
          return;
        }

        result = parseFloat(result.toPrecision(12));
        expressionEl.textContent = `${label} =`;
        currentInput = String(result);
        shouldResetInput = true;
        updateDisplay();
      }

      function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let result = 1;
        for (let i = 2; i <= n; i++) {
          result *= i;
        }
        return result;
      }

      function insertConstant(c) {
        if (c === "pi") {
          currentInput = String(Math.PI);
          expressionEl.textContent = "π";
        } else if (c === "e") {
          currentInput = String(Math.E);
          expressionEl.textContent = "e";
        }
        shouldResetInput = true;
        updateDisplay();
      }

      function insertRandom() {
        currentInput = String(parseFloat(Math.random().toPrecision(10)));
        expressionEl.textContent = "Rand";
        shouldResetInput = true;
        updateDisplay();
      }

      function insertParenthesis(p) {
        // 괄호는 수식 표현에 추가
        if (shouldResetInput && p === "(") {
          expressionEl.textContent = (expressionEl.textContent || "") + " (";
        } else if (p === ")") {
          expressionEl.textContent =
            (expressionEl.textContent || "") + currentInput + " )";
          shouldResetInput = true;
        }
      }

      function clearAll() {
        currentInput = "0";
        previousInput = "";
        operator = null;
        shouldResetInput = false;
        expressionEl.textContent = "";
        updateDisplay();
      }

      function toggleSign() {
        if (currentInput !== "0" && currentInput !== "오류") {
          if (currentInput.startsWith("-")) {
            currentInput = currentInput.substring(1);
          } else {
            currentInput = "-" + currentInput;
          }
          updateDisplay();
        }
      }

      function percent() {
        if (currentInput !== "오류") {
          currentInput = String(parseFloat(currentInput) / 100);
          updateDisplay();
        }
      }

      // 키보드 지원
      document.addEventListener("keydown", (e) => {
        if (e.key >= "0" && e.key <= "9") appendNumber(e.key);
        else if (e.key === ".") appendDot();
        else if (e.key === "+") setOperator("+");
        else if (e.key === "-") setOperator("−");
        else if (e.key === "*") setOperator("×");
        else if (e.key === "/") {
          e.preventDefault();
          setOperator("÷");
        } else if (e.key === "^") setOperator("xⁿ");
        else if (e.key === "Enter" || e.key === "=") calculate();
        else if (e.key === "Escape") clearAll();
        else if (e.key === "Backspace") {
          if (currentInput.length > 1) {
            currentInput = currentInput.slice(0, -1);
          } else {
            currentInput = "0";
          }
          updateDisplay();
        } else if (e.key === "%") percent();
        else if (e.key === "!") applyUnary("factorial");
        else if (e.key === "p") insertConstant("pi");
        else if (e.key === "e" && !e.ctrlKey && !e.metaKey) insertConstant("e");
        else if (e.key === "s") applyUnary("sin");
        else if (e.key === "c") applyUnary("cos");
        else if (e.key === "t") applyUnary("tan");
        else if (e.key === "l") applyUnary("log");
        else if (e.key === "r") applyUnary("sqrt");
      });

      // 초기화
      setMode("basic");
    </script>
  </body>
</html>
