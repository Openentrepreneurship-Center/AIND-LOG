# Testcontainers PostgreSQL - dynamically injected via @ServiceConnection
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT
jwt.secret=test-secret-key-that-is-at-least-64-characters-long-for-hmac-sha256-algorithm-testing
jwt.access-expiration=1800000
jwt.refresh-expiration=2592000000
jwt.admin-refresh-expiration=604800000

# Cookie
cookie.domain=
cookie.secure=false
cookie.same-site=Lax

# HTTPS not required in tests
security.https-required=false

# AWS (dummy)
aws.access-key=test-access-key
aws.secret-key=test-secret-key
aws.s3.region=ap-northeast-2
aws.s3.bucket=test-bucket
aws.sns.region=ap-northeast-1

# OTP (Base64-encoded 32-byte key for AES-256-GCM)
otp.encryption-key=Y9q3dmkfLZ2evFr8ebXI0XKBx5BsE7uLt8z4hlrrtEs=

# TossPayments
tosspayments.secret-key=test-toss-secret
tosspayments.api-url=http://localhost:0

# Rate limiting disabled in tests
rate-limit.enabled=false

# CORS
cors.allowed-origins=http://localhost:3000

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
