spring.application.name=backend

spring.config.import=optional:file:.env[.properties]

# PostgreSQL Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/decapet}
spring.datasource.username=${DATABASE_USERNAME:decapet}
spring.datasource.password=${DATABASE_PASSWORD:decapet123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Jackson Timezone (KST)
spring.jackson.time-zone=Asia/Seoul

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (Database Migration)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:1800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}
jwt.admin-refresh-expiration=${JWT_ADMIN_REFRESH_EXPIRATION:604800000}

# AWS Common
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}

# AWS S3 Configuration (ap-northeast-2 Seoul)
aws.s3.region=${AWS_S3_REGION:ap-northeast-2}
aws.s3.bucket=${AWS_S3_BUCKET}

# AWS SNS Configuration (ap-northeast-1 Tokyo)
aws.sns.region=${AWS_SNS_REGION:ap-northeast-1}

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.default-models-expand-depth=-1
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-extensions=false
springdoc.swagger-ui.show-common-extensions=false
springdoc.swagger-ui.custom-css-url=/swagger-ui-custom.css

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Rate Limiting
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.default-requests-per-minute=${RATE_LIMIT_DEFAULT_RPM:100}
rate-limit.auth-requests-per-minute=${RATE_LIMIT_AUTH_RPM:10}
rate-limit.sms-requests-per-10-minutes=${RATE_LIMIT_SMS_RPM:5}
rate-limit.refresh-requests-per-minute=${RATE_LIMIT_REFRESH_RPM:5}

# Cookie Configuration
cookie.domain=${COOKIE_DOMAIN:}
cookie.secure=${COOKIE_SECURE:true}
#cookie.same-site=${COOKIE_SAME_SITE:Strict}
cookie.same-site=Lax
cookie.access-token-name=accessToken
cookie.refresh-token-name=refreshToken
cookie.access-token-path=/
cookie.refresh-token-path=/
cookie.admin-access-token-name=adminAccessToken
cookie.admin-refresh-token-name=adminRefreshToken
cookie.admin-access-token-path=/
cookie.admin-refresh-token-path=/

security.https-required=false

# OTP Configuration
otp.encryption-key=${OTP_ENCRYPTION_KEY}

# TossPayments
tosspayments.secret-key=${TOSSPAYMENTS_SECRET_KEY}
tosspayments.api-url=${TOSSPAYMENTS_API_URL:https://api.tosspayments.com}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true
