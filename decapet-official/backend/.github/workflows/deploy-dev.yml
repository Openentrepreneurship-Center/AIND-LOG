name: Deploy to Development

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: decapet-backend-dev
  ECR_REGISTRY: 823292484546.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Get EC2 Instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Environment,Values=dev" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSM
        env:
          DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_AWS_ACCESS_KEY: ${{ secrets.APP_AWS_ACCESS_KEY }}
          APP_AWS_SECRET_KEY: ${{ secrets.APP_AWS_SECRET_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          TOSSPAYMENTS_SECRET_KEY: ${{ secrets.TOSSPAYMENTS_SECRET_KEY }}
          OTP_ENCRYPTION_KEY: ${{ secrets.OTP_ENCRYPTION_KEY }}
        run: |
          # Create deploy script
          cat > /tmp/deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          # ECR Login
          aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 823292484546.dkr.ecr.ap-northeast-2.amazonaws.com

          # Pull image
          docker pull 823292484546.dkr.ecr.ap-northeast-2.amazonaws.com/decapet-backend-dev:latest

          # Stop and remove old container
          docker stop dev-backend || true
          docker rm dev-backend || true

          # Get host IP for database connection
          HOST_IP=$(hostname -I | awk '{print $1}')

          # Run new container
          docker run -d --name dev-backend \
            -p 8080:8080 \
            --restart unless-stopped \
            -e SPRING_PROFILES_ACTIVE=dev \
            -e DATABASE_URL="jdbc:postgresql://${HOST_IP}:5432/decapet" \
            -e DATABASE_USERNAME=decapet \
            -e DATABASE_PASSWORD="__DEV_DATABASE_PASSWORD__" \
            -e JWT_SECRET="__JWT_SECRET__" \
            -e AWS_ACCESS_KEY="__APP_AWS_ACCESS_KEY__" \
            -e AWS_SECRET_KEY="__APP_AWS_SECRET_KEY__" \
            -e AWS_S3_BUCKET="__AWS_S3_BUCKET__" \
            -e TOSSPAYMENTS_SECRET_KEY="__TOSSPAYMENTS_SECRET_KEY__" \
            -e OTP_ENCRYPTION_KEY="__OTP_ENCRYPTION_KEY__" \
            -e CORS_ALLOWED_ORIGINS="https://dev.decapet.co.kr,https://dev.api.decapet.co.kr,http://localhost:3000" \
            823292484546.dkr.ecr.ap-northeast-2.amazonaws.com/decapet-backend-dev:latest

          # Cleanup
          docker image prune -af

          # Verify
          sleep 5
          docker ps | grep dev-backend && echo "Deploy success" || exit 1
          SCRIPT

          # Replace placeholders with actual secrets
          sed -i "s|__DEV_DATABASE_PASSWORD__|${DEV_DATABASE_PASSWORD}|g" /tmp/deploy.sh
          sed -i "s|__JWT_SECRET__|${JWT_SECRET}|g" /tmp/deploy.sh
          sed -i "s|__APP_AWS_ACCESS_KEY__|${APP_AWS_ACCESS_KEY}|g" /tmp/deploy.sh
          sed -i "s|__APP_AWS_SECRET_KEY__|${APP_AWS_SECRET_KEY}|g" /tmp/deploy.sh
          sed -i "s|__AWS_S3_BUCKET__|${AWS_S3_BUCKET}|g" /tmp/deploy.sh
          sed -i "s|__TOSSPAYMENTS_SECRET_KEY__|${TOSSPAYMENTS_SECRET_KEY}|g" /tmp/deploy.sh
          sed -i "s|__OTP_ENCRYPTION_KEY__|${OTP_ENCRYPTION_KEY}|g" /tmp/deploy.sh

          # Send command via SSM
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --parameters "commands=[\"$(cat /tmp/deploy.sh | base64 -w 0 | xargs -I {} echo 'echo {} | base64 -d | bash')\"]" \
            --region ${{ env.AWS_REGION }} \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: Status = $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}"
              exit 1
            fi

            sleep 10
          done

          echo "Deployment timed out"
          exit 1
